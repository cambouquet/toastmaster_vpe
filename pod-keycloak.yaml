apiVersion: v1
kind: Pod
metadata:
  name: keycloak-pod
spec:
  containers:
  - name: keycloak
    image: quay.io/keycloak/keycloak:24.0.0
    args: ["start-dev", "--import-realm"]
    env:
    - name: KC_BOOTSTRAP_ADMIN_USERNAME
      value: admin
    - name: KC_BOOTSTRAP_ADMIN_PASSWORD
      value: admin
    - name: KC_DB
      value: dev-file
    - name: KC_HTTP_PORT
      value: "8080"
    - name: KC_HOSTNAME_STRICT
      value: "false"
    ports:
    - containerPort: 8080
      hostPort: 8080
    volumeMounts:
    - name: keycloak-data
      mountPath: /opt/keycloak/data
    - name: realm-import
      mountPath: /opt/keycloak/data/import/realm.json
  volumes:
  - name: keycloak-data
    hostPath:
      path: ./keycloak-data
  - name: realm-import
    hostPath:
      path: ./keycloak-realm.json
