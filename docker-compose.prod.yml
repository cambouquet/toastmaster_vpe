version: '3.8'

services:
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

  app:
    image: ${APP_IMAGE}
    restart: always
    expose:
      - "80"
    depends_on:
      - keycloak

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    command: start --import-realm --hostname=auth.k-app.tech --http-enabled=true --proxy=edge
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: h2-file
      KC_HTTP_PORT: 8080
      KC_HOSTNAME: auth.k-app.tech
      KC_PROXY: edge
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak-realm.json:/opt/keycloak/data/import/realm.json

volumes:
  keycloak_data:
  caddy_data:
  caddy_config:
