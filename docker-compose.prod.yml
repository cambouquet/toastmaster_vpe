services:
  caddy:
    image: caddy:2-alpine
    restart: always
    ports: 
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-k-app.tech}
      - AUTH_DOMAIN_NAME=${AUTH_DOMAIN_NAME:-auth.k-app.tech}
      - CADDY_EMAIL=${CADDY_EMAIL:-kami@k-app.tech}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [app]
  app:
    image: ${APP_IMAGE}
    restart: always
    expose: ["80"]
    depends_on: [keycloak]
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    command: start --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: dev-file
      KC_HTTP_PORT: 8080
      KC_HOSTNAME: ${AUTH_DOMAIN_NAME:-auth.k-app.tech}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "true"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KC_DB_URL: "jdbc:h2:file:/opt/keycloak/data/h2/keycloakdb;AUTO_SERVER=TRUE"
    ports: ["${KEYCLOAK_PORT:-8080}:8080"]
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak-realm.json:/opt/keycloak/data/import/realm.json
  couchbase:
    image: couchbase:community
    restart: always
    environment:
      - COUCHBASE_ADMINISTRATOR_USERNAME=admin
      - COUCHBASE_ADMINISTRATOR_PASSWORD=password
    ports: 
      - "${COUCHBASE_PORT:-8091}:8091"
      - "${COUCHBASE_EXT_PORT:-8092}:8092"
      - "${COUCHBASE_QUERY_PORT:-8093}:8093"
      - "${COUCHBASE_SEARCH_PORT:-8094}:8094"
      - "${COUCHBASE_MEM_PORT:-11210}:11210"
    volumes: ["couchbase_data:/opt/couchbase/var"]
volumes: {keycloak_data: {}, caddy_data: {}, caddy_config: {}, couchbase_data: {}}
