name: Deploy Env
description: "Deploy to a specific environment (prod/test)"
inputs:
  target:
    description: 'Target environment (prod or test)'
    required: true
  vm_host:
    description: 'VM Host'
    required: true
  vm_user:
    description: 'VM User'
    required: true
  ssh_key:
    description: 'SSH Private Key'
    required: true
  app_image:
    description: 'Docker image to deploy'
    required: true

runs:
  using: "composite"
  steps:
    - name: "🛰️ Sequence: Rapid Fire -> Deep Recovery"
      shell: bash
      env:
        SSH_KEY: ${{ inputs.ssh_key }}
        VM_HOST: ${{ inputs.vm_host }}
        VM_USER: ${{ inputs.vm_user }}
        TARGET: ${{ inputs.target }}
      run: |
        # Mainstream Native SSH (No binary downloads, 0s latency)
        # Avoids appleboy/ssh-action download overhead
        
        ID_FILE=$(mktemp)
        echo "$SSH_KEY" > "$ID_FILE"
        chmod 600 "$ID_FILE"

        ssh -i "$ID_FILE" -o StrictHostKeyChecking=no -o ConnectTimeout=10 "$VM_USER@$VM_HOST" "bash -s" << EOF
          set -e
          
          # RAPID FIRE
          FUNCTION_RAPID_FIRE() {
            cd \$HOME/app && \
            git fetch origin main && \
            git reset --hard origin/main && \
            node deploy.mjs $TARGET
          }

          # DEEP RECOVERY
          FUNCTION_DEEP_RECOVERY() {
            echo "⚠️ RAPID FIRE FAILED. Initiating Deep Recovery..."
            if [ ! -d "\$HOME/app/.git" ]; then
              rm -rf "\$HOME/app"
              git clone https://github.com/k-app-tech/k-app.git "\$HOME/app"
            fi
            
            cd \$HOME/app
            
            # Upgrade Node if not v24
            CURRENT_NODE_VER=\$(node -v 2>/dev/null || echo "v0")
            if [[ ! "\$CURRENT_NODE_VER" =~ ^v24\. ]]; then
              echo "📍 Upgrading Node from \$CURRENT_NODE_VER to v24..."
              curl -fsSL https://deb.nodesource.com/setup_24.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi
            
            git fetch origin main
            git reset --hard origin/main
            # Use 'sg' only if necessary, here we assume standard docker group
            node deploy.mjs $TARGET
          }

          FUNCTION_RAPID_FIRE || FUNCTION_DEEP_RECOVERY
        EOF
        
        rm -f "$ID_FILE"
