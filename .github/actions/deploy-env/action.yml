name: Deploy Env
description: "Deploy to a specific environment (prod/test)"
inputs:
  target:
    description: 'Target environment (prod or test)'
    required: true
  vm_host:
    description: 'VM Host'
    required: true
  vm_user:
    description: 'VM User'
    required: true
  ssh_key:
    description: 'SSH Private Key'
    required: true
  app_image:
    description: 'Docker image to deploy'
    required: true

runs:
  using: "composite"
  steps:
    - name: "🛰️ Sequence: Rapid Fire -> Deep Recovery"
      uses: appleboy/ssh-action@v1.2.5
      with:
        host: ${{ inputs.vm_host }}
        username: ${{ inputs.vm_user }}
        key: ${{ inputs.ssh_key }}
        script: |
          # RAPID FIRE: Assume environment is warm
          FUNCTION_RAPID_FIRE() {
            set -e
            cd $HOME/app && \
            git fetch origin main && \
            git reset --hard origin/main && \
            node deploy.mjs ${{ inputs.target }}
          }

          # DEEP RECOVERY: Fix system if Rapid Fire fails
          FUNCTION_DEEP_RECOVERY() {
            set -e
            echo "⚠️ RAPID FIRE FAILED. Initiating Deep Recovery..."
            
            # 1. Recover Git Workspace
            if [ ! -d "$HOME/app/.git" ]; then
              rm -rf "$HOME/app"
              git clone https://github.com/k-app-tech/k-app.git "$HOME/app"
              cd $HOME/app
            fi

            # 2. Recover Node.js
            if ! command -v node &> /dev/null; then
              echo "Fixing Node..."
              curl -fsSL https://deb.nodesource.com/setup_24.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            # 3. Recover Docker
            if ! command -v docker &> /dev/null; then
              echo "Fixing Docker..."
              sudo apt-get update && sudo apt-get install -y docker.io
              sudo usermod -aG docker $USER
            fi

            # 4. Final Attempt
            cd $HOME/app
            git fetch origin main
            git reset --hard origin/main
            sg docker -c "node deploy.mjs ${{ inputs.target }}"
          }

          # Execution logic
          FUNCTION_RAPID_FIRE || FUNCTION_DEEP_RECOVERY
