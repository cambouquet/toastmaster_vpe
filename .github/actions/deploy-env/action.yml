name: Deploy Env
description: "Deploy to a specific environment (prod/test)"
inputs:
  target:
    description: 'Target environment (prod or test)'
    required: true
  vm_host:
    description: 'VM Host'
    required: true
  vm_user:
    description: 'VM User'
    required: true
  ssh_key:
    description: 'SSH Private Key'
    required: true
  app_image:
    description: 'Docker image to deploy'
    required: true

runs:
  using: "composite"
  steps:
    - name: Neural Deployment Sequence
      uses: appleboy/ssh-action@v1.2.5
      with:
        host: ${{ inputs.vm_host }}
        username: ${{ inputs.vm_user }}
        key: ${{ inputs.ssh_key }}
        script: |
          set -e
          # Robust workspace initialization
          if [ ! -d "$HOME/app/.git" ]; then
            echo "Target directory is not a git repo or doesn't exist. Cleaning and cloning..."
            rm -rf "$HOME/app"
            git clone https://github.com/k-app-tech/k-app.git "$HOME/app"
          fi
          
          cd "$HOME/app"
          git fetch origin main
          git reset --hard origin/main
          
          # Force load shell environment for node
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          [ -f "$HOME/.profile" ] && \. "$HOME/.profile"
          [ -f "$HOME/.bashrc" ] && \. "$HOME/.bashrc"

          # Ensure common paths are present
          export PATH="$PATH:/usr/local/bin:/usr/bin:/bin:/snap/bin"
          
          # Self-healing Node.js installation if missing
          if ! command -v node &> /dev/null; then
             echo "Node.js not found. Installing Node.js LTS..."
             curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
             sudo apt-get install -y nodejs
          fi

          echo "Using Node: $(node -v)"
          node deploy.mjs ${{ inputs.target }}
