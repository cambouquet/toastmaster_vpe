name: Deploy Env
description: "Deploy to a specific environment (prod/test)"
inputs:
  target:
    description: 'Target environment (prod or test)'
    required: true
  vm_host:
    description: 'VM Host'
    required: true
  vm_user:
    description: 'VM User'
    required: true
  ssh_key:
    description: 'SSH Private Key'
    required: true
  app_image:
    description: 'Docker image to deploy'
    required: true

runs:
  using: "composite"
  steps:
    - name: Neural Deployment Sequence
      uses: appleboy/ssh-action@v1.2.5
      with:
        host: ${{ inputs.vm_host }}
        username: ${{ inputs.vm_user }}
        key: ${{ inputs.ssh_key }}
        script: |
          # Ensure workspace exists
          mkdir -p $HOME/app
          if [ ! -d "$HOME/app/.git" ]; then
            git clone https://github.com/k-app-tech/k-app.git $HOME/app
          fi
          
          cd $HOME/app
          git fetch origin main
          git reset --hard origin/main
          
          # Force Node into PATH (NVM and standard paths)
          export PATH=$PATH:/usr/local/bin:/usr/bin:/bin
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          
          # Final check - if node still missing, try which
          if ! command -v node &> /dev/null; then
            echo "Node not found in PATH. Attempting to locate..."
            export PATH=$PATH:$(dirname $(which node 2>/dev/null || echo ""))
          fi

          node deploy.mjs ${{ inputs.target }}
