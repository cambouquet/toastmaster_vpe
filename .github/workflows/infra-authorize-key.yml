name: Infra - Authorize Neural Link
on:
  workflow_dispatch:
    inputs:
      public_key:
        description: 'Neural Link Public Key (PASTE CONTENT OF id_ed25519.pub)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  authorize:
    runs-on: self-hosted
    steps:
      - name: Inject Public Key via Existing Secret Link
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            echo "${{ github.event.inputs.public_key }}" >> ~/.ssh/authorized_keys
            sort -u ~/.ssh/authorized_keys -o ~/.ssh/authorized_keys
            chmod 600 ~/.ssh/authorized_keys
            echo ">>> NEURAL LINK ESTABLISHED. Workstation authorized."
