name: "🚀 System: Ship"
run-name: "🚀 Shipping to ${{ inputs.target || 'main' }}"
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, "${{ matrix.target }}"]
    strategy:
      fail-fast: false
      matrix: { target: [prod, test] }
    steps:
      - name: "🛰️ Native Setup"
        run: |
          # RAPID FIRE
          (git fetch --depth 1 origin main && git reset --hard FETCH_HEAD && git clean -fd) || (
            # DEEP RECOVERY
            echo "⚠️ RAPID FIRE Setup failed. Running Recovery..."
            git init
            git remote add origin https://github.com/${{ github.repository }}.git 2>/dev/null || \
            git remote set-url origin https://github.com/${{ github.repository }}.git
            git fetch --depth 1 origin main
            git reset --hard FETCH_HEAD
            git clean -fd
          )
      - name: "🚢 Native SSH Deployment"
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VM_HOST: "127.0.0.1" # Parallel loopback (Local runner on VM)
          VM_USER: ${{ secrets.VM_USER }}
          TARGET: ${{ matrix.target }}
        run: |
          export ID_FILE=$(mktemp)
          echo "$SSH_KEY" > "$ID_FILE"
          chmod 600 "$ID_FILE"
          bash scripts/deploy-ssh.sh
          rm -f "$ID_FILE"
