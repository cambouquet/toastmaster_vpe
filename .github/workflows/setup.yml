name: "🛰️ PROVISION: New VM Setup"
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target Server'
        required: true
        type: choice
        options: [prod, test, all]
        default: 'all'
      host:
        description: 'New VM IP (MANDATORY if not in secrets)'
        required: false
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.target }}" = "all" ]; then
            echo 'matrix=["prod", "test"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ github.event.inputs.target }}"]' >> $GITHUB_OUTPUT
          fi

  bootstrap:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.matrix) }}
    permissions:
      actions: write
      contents: read
      id-token: write
    steps:
      - name: "💾 Persist Infrastructure Secret"
        if: github.event.inputs.host != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          S_NAME="VM_HOST$( [ "${{ matrix.target }}" = "test" ] && echo "_TEST" || echo "" )"
          echo "Updating $S_NAME in ${{ github.repository }}..."
          gh secret set "$S_NAME" --body "${{ github.event.inputs.host }}" -R "${{ github.repository }}"

      - name: "🛰️ Fetch Action Token"
        id: tok
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          T=$(gh api -X POST repos/${{github.repository}}/actions/runners/registration-token -q .token)
          echo "t=$T" >> $GITHUB_OUTPUT

      - name: "🚢 Native Setup: ${{ matrix.target }}"
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ github.event.inputs.host || (matrix.target == 'prod' && secrets.VM_HOST || secrets.VM_HOST_TEST) }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Capture the IP of the VM we are currently logged into
            REMOTE_IP=$(curl -s https://ifconfig.me || hostname -I | awk '{print $1}')
            echo "📍 Infrastructure Node identified at: $REMOTE_IP"

            # 2. Store remoting params
            cat << 'INNER_EOF' > ~/setup_params.sh
            export TOKEN="${{ steps.tok.outputs.t }}"
            export TARGET="${{ matrix.target }}"
            export REPO="${{ github.repository }}"
            export IP="$REMOTE_IP"
            INNER_EOF
            
            # 3. Standard Layer Provisioning
            curl -H "Authorization: token ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}" \
                 -sSL "https://raw.githubusercontent.com/${{ github.repository }}/main/setup_vm.sh" | bash
            
            # 4. Runner Registration
            source ~/setup_params.sh
            curl -H "Authorization: token ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}" \
                 -sSL "https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/setup-runner.sh" | bash -s -- "$TOKEN" "$TARGET" "$REPO"
            
            rm ~/setup_params.sh
