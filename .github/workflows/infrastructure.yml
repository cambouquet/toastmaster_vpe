name: 🛠️ INFRASTRUCTURE | Maintenance & Setup
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'verify'
        type: choice
        options:
          - verify
          - full-setup
          - prune-system

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  maintenance:
    runs-on: self-hosted
    steps:
      - name: ⚡ Pulse Execution
        run: |
          echo "Executing: ${{ github.event.inputs.action }}"
          
          case "${{ github.event.inputs.action }}" in
            "verify")
              docker version && node -v && npm -v
              ;;
            "full-setup")
              echo "🚀 Starting Full System Setup..."
              sudo apt-get update
              sudo apt-get install -y docker.io nodejs npm
              sudo usermod -aG docker $USER
              echo "✅ Full Setup Complete."
              ;;
            "prune-system")
              docker system prune -af --volumes
              ;;
          esac
