name: 🛠️ INFRASTRUCTURE | Maintenance & Setup
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'verify'
        type: choice
        options:
          - verify
          - full-setup
          - prune-system


jobs:
  maintenance:
    runs-on: self-hosted
    steps:
      - name: ⚡ Pulse Execution
        run: |
          echo "Executing: ${{ github.event.inputs.action }}"
          
          case "${{ github.event.inputs.action }}" in
            "verify")
              node -v | grep "v24" || (echo "Node 24 required" && exit 1)
              docker version && npm -v
              ;;
            "full-setup")
              echo "🚀 Starting Full System Setup (Node 24)..."
              sudo apt-get update
              sudo apt-get install -y docker.io
              curl -fsSL https://deb.nodesource.com/setup_24.x | sudo -E bash -
              sudo apt-get install -y nodejs
              sudo usermod -aG docker $USER
              echo "✅ Full Setup Complete."
              ;;
            "prune-system")
              docker system prune -af --volumes
              ;;
          esac
