name: Runner Maintenance & Rescue

on:
  schedule:
    - cron: '0 3 * * *' # Every day at 3 AM
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'check'
        type: choice
        options:
          - check
          - restart
          - deep-clean


jobs:
  rescue-runner:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Rescue Operations
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🩺 Running Diagnostics..."
            
            # 1. Check Service Status
            if systemctl is-active --quiet actions.runner.*.service; then
              echo "✅ Runner service is active."
            else
              echo "⚠️ Runner service is DOWN. Attempting restart..."
              sudo systemctl restart actions.runner.*.service || true
            fi

            # 2. Check Disk Space (Most common cause of stuck runners)
            echo "💾 Disk Usage:"
            df -h / | grep /

            # 3. Clean Garbage
            if [[ "${{ github.event.inputs.action }}" == "deep-clean" ]]; then
              echo "🧹 Performing Deep Clean..."
              sudo docker system prune -a --volumes -f
              rm -rf ~/actions-runner/_work/*
              echo "✨ Deep clean complete."
            else
              echo "🧹 Basic cleanup..."
              sudo docker image prune -f
              # Only clear _work if it's extremely large
              find ~/actions-runner/_work -maxdepth 1 -mtime +7 -exec rm -rf {} + || true
            fi
            
            # 4. Restart if requested
            if [[ "${{ github.event.inputs.action }}" == "restart" ]]; then
              echo "🔄 Forced restart of runner service..."
              sudo systemctl restart actions.runner.*.service
            fi

            echo "🚀 Runner is ready."
