name: "🛠️ MAINTENANCE: Infrastructure Control"
run-name: "🛠️ [${{ inputs.target }}] Task: ${{ inputs.action }}"
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target Server'
        required: true
        type: choice
        options: [prod, test, all]
        default: 'all'
      action:
        description: 'Maintenance Task'
        required: true
        type: choice
        options: [telemetry, cleanup, patch-os, hard-reset, restart-agent, debug-offline]
      host:
        description: 'Manual IP (if not in secrets)'
        required: false
        type: string
      arg:
        description: 'Optional Input'
        required: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.target }}" = "all" ]; then
            echo 'matrix=["prod", "test"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ github.event.inputs.target }}"]' >> $GITHUB_OUTPUT
          fi

  rescue-operation:
    needs: prepare
    if: github.event.inputs.action == 'restart-agent' || github.event.inputs.action == 'debug-offline'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: "⛑️ Remote Operation: ${{ matrix.target }}"
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ github.event.inputs.host || (matrix.target == 'prod' && secrets.VM_HOST || secrets.VM_HOST_TEST) }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if [ "${{ github.event.inputs.action }}" = "debug-offline" ]; then
              echo "--- 🔍 OFFLINE DEBUG: ${{ matrix.target }} ---"
              echo "📍 Service Status:"
              sudo systemctl list-units "actions.runner.*" --all
              echo "📍 Process Check:"
              ps aux | grep -v grep | grep "Runner" || echo "No Runner processes found."
              echo "📍 Recent Logs (last 20 lines):"
              sudo journalctl -u "actions.runner.*" -n 20 --no-pager || echo "No logs found."
              exit 0
            fi

            echo "--- ⛑️ AGENT RESTART: ${{ matrix.target }} ---"
            # Use a more reliable restart sequence with absolute paths and sudo
            sudo systemd-run --unit=runner-fix-${{ matrix.target }} --remain-after-exit bash -c "
              echo '🛑 Killing existing processes...'
              systemctl stop actions.runner.* || true
              pkill -9 -f 'Runner.Worker' || true
              pkill -9 -f 'Runner.Listener' || true
              sleep 2
              echo '🏁 Starting via svc.sh...'
              if [ -d /home/${{ secrets.VM_USER }}/actions-runner ]; then
                cd /home/${{ secrets.VM_USER }}/actions-runner && sudo ./svc.sh start
              else
                echo '❌ Runner directory not found!'
              fi
            "
            echo "✅ Restart command handed to Systemd."
            echo "--- ⏭️ NEXT ACTIONS ---"
            echo "1. Wait 30s for GitHub handshake."
            echo "2. Run MAINTENANCE -> 'telemetry' to verify status."
            echo "3. If still offline, run PROVISION workflow to re-register."

  standard-operation:
    needs: prepare
    if: github.event.inputs.action != 'restart-agent'
    runs-on: ['self-hosted', '${{ matrix.target }}']
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: "🛰️ Synchronize: infra-lib"
        run: curl -sSL https://raw.githubusercontent.com/${{github.repository}}/main/scripts/lib-infra.sh -o lib-infra.sh
      - name: "🛠️ Execute: ${{ inputs.action }}"
        run: bash lib-infra.sh "${{ inputs.action }}" "${{ inputs.arg }}"
