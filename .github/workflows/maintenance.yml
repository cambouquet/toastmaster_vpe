name: "🛠️ MAINTENANCE: Infrastructure Control"
run-name: "🛠️ [${{ inputs.target }}] Task: ${{ inputs.action }}"
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target Server'
        required: true
        type: choice
        options: [prod, test, all]
        default: 'all'
      action:
        description: 'Maintenance Task'
        required: true
        type: choice
        options: [telemetry, cleanup, patch-os, hard-reset, restart-runner, debug-runner-issue]
      host:
        description: 'Manual IP (if not in secrets)'
        required: false
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.target }}" = "all" ]; then
            echo 'matrix=["prod", "test"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ github.event.inputs.target }}"]' >> $GITHUB_OUTPUT
          fi

  infrastructure-control:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: "🛰️ Out-of-Band Action: ${{ inputs.action }}"
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ github.event.inputs.host || (matrix.target == 'prod' && secrets.VM_HOST || secrets.VM_HOST_TEST) }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Fetch library
            curl -sSL "https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/lib-infra.sh" -o ~/lib-infra.sh
            
            # 2. Delayed Repair Function (Ensures SSH session can close before restart)
            repair_runner() {
              echo "⛑️ Detaching repair logic (5s delay)..."
              # Double-fork with a sleep. Setsid ensures we are not killed when the SSH session exits.
              sudo setsid bash -c "
                (
                  sleep 5
                  systemctl stop actions.runner.* || true
                  pkill -9 -f Runner || true
                  sleep 2
                  cd /home/${{ secrets.VM_USER }}/actions-runner && ./svc.sh start
                ) > /dev/null 2>&1 &
              "
            }

            # 3. Routing
            case "${{ inputs.action }}" in
              "restart-runner")
                repair_runner
                echo "✅ Restart scheduled. Connection closing now."
                exit 0
                ;;
              "debug-runner-issue")
                sudo systemctl list-units "actions.runner.*" --all
                sudo journalctl -u "actions.runner.*" -n 20 --no-pager
                exit 0
                ;;
            esac

            # 4. Auto-Repair with Safety Sleep
            if [[ "${{ inputs.action }}" != "hard-reset" ]]; then
              if ! systemctl is-active --quiet "actions.runner.*"; then
                echo "⚠️ Runner is OFFLINE. Triggering delayed repair..."
                repair_runner
              fi
            fi

            # 5. Execute Library
            bash ~/lib-infra.sh "${{ inputs.action }}"

            # 6. Auto-Chaining
            if [ "${{ inputs.action }}" == "cleanup" ]; then
              echo "⏭️ Chaining telemetry..."
              bash ~/lib-infra.sh "telemetry"
            fi
