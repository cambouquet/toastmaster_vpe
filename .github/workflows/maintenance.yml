name: "🛠️ MAINTENANCE: Infrastructure Control"
run-name: "🛠️ [${{ inputs.target }}] Task: ${{ inputs.action }}"
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target Server'
        required: true
        type: choice
        options: [prod, test, all]
        default: 'all'
      action:
        description: 'Maintenance Task'
        required: true
        type: choice
        options: [pulse, prune, upgrade, burn, rescue]
      host:
        description: 'Manual IP (if not in secrets)'
        required: false
        type: string
      arg:
        description: 'Optional Input'
        required: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.target }}" = "all" ]; then
            echo 'matrix=["prod", "test"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ github.event.inputs.target }}"]' >> $GITHUB_OUTPUT
          fi

  rescue-operation:
    needs: prepare
    if: github.event.inputs.action == 'rescue'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: "⛑️ Rescue Handshake: ${{ matrix.target }}"
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ github.event.inputs.host || (matrix.target == 'prod' && secrets.VM_HOST || secrets.VM_HOST_TEST) }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "--- ⛑️ EMERGENCY RESCUE: ${{ matrix.target }} ---"
            # Use systemd-run to create a transient background service. 
            # This is the most robust way to survive an SSH session termination.
            sudo systemd-run --unit=runner-rescue-${{ matrix.target }} --remain-after-exit bash -c "
              echo '🛑 Stopping runner processes...'
              systemctl stop actions.runner.* || true
              pkill -9 -f 'Runner.Worker' || true
              pkill -9 -f 'Runner.Listener' || true
              sleep 2
              echo '🏁 Restarting runner...'
              cd /home/${{ secrets.VM_USER }}/actions-runner && ./svc.sh start
            "
            
            echo "✅ Rescue transient service created and started."
            echo "Check status later with: systemctl status runner-rescue-${{ matrix.target }}"

  standard-operation:
    needs: prepare
    if: github.event.inputs.action != 'rescue'
    runs-on: ['self-hosted', '${{ matrix.target }}']
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: "🛰️ Synchronize: infra-lib"
        run: curl -sSL https://raw.githubusercontent.com/${{github.repository}}/main/scripts/lib-infra.sh -o lib-infra.sh
      - name: "🛠️ Execute: ${{ inputs.action }}"
        run: bash lib-infra.sh "${{ inputs.action }}" "${{ inputs.arg }}"
