name: "🛠️ MAINTENANCE: Server Infrastructure"
run-name: "🛠️ [${{ inputs.target }}] Task: ${{ inputs.action }}"
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Server Target'
        required: true
        type: choice
        options: [prod, test, all]
        default: 'all'
      action:
        description: 'Action to Perform'
        required: true
        type: choice
        options: [telemetry, cleanup, patch-os, hard-reset, restart-runner, debug-runner-issue]
      host:
        description: 'Manual IP'
        required: false
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.target }}" = "all" ]; then
            echo 'matrix=["prod", "test"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ github.event.inputs.target }}"]' >> $GITHUB_OUTPUT
          fi

  maintenance:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: "SSH Maintenance Task: ${{ inputs.action }}"
        uses: appleboy/ssh-action@v1.2.5
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ github.event.inputs.host || (matrix.target == 'prod' && secrets.VM_HOST || secrets.VM_HOST_TEST) }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GH_TOKEN
          script: |
            curl -sSL "https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/lib-infra.sh" -o ~/lib-infra.sh
            export GH_TOKEN="$GH_TOKEN"

            if [[ "${{ inputs.action }}" == "restart-runner" ]]; then
              echo "╔══════════════════════════════════════════════════════════════╗"
              echo "║ ⛑️  RUNNER REPAIR INITIATED                                   ║"
              echo "╠══════════════════════════════════════════════════════════════╣"
              echo "║ 1. Stopping hanging services...                              ║"
              sudo systemctl stop actions.runner.* || true
              
              echo "║ 2. Verifying installation...                                 ║"
              cd /home/${{ secrets.VM_USER }}/actions-runner || (echo "║ FAILED: Runner dir missing                           ║" && exit 1)
              sudo ./svc.sh install > /dev/null 2>&1 || true
              
              echo "║ 3. Detaching restart process...                              ║"
              sudo setsid bash -c "sleep 5; cd /home/${{ secrets.VM_USER }}/actions-runner && ./svc.sh start" > /dev/null 2>&1 &
              
              echo "╠══════════════════════════════════════════════════════════════╣"
              echo "║ ✅ REPAIR DISPATCHED. SSH session closing to allow restart.  ║"
              echo "║ ⏳ Please wait 20 seconds and then run 'telemetry'.          ║"
              echo "╚══════════════════════════════════════════════════════════════╝"
              exit 0
            fi

            # Auto-repair for other actions if runner is dead
            if [[ "${{ inputs.action }}" != "hard-reset" ]]; then
              if ! systemctl is-active --quiet "actions.runner.*"; then
                 echo "⚠️ Runner dead. Triggering background repair..."
                 sudo setsid bash -c "sleep 2; cd /home/${{ secrets.VM_USER }}/actions-runner && ./svc.sh start" > /dev/null 2>&1 &
                 sleep 3
              fi
            fi

            bash ~/lib-infra.sh "${{ inputs.action }}"
