name: "🛠️ MAINTENANCE: Infrastructure Control"
run-name: "🛠️ [${{ inputs.target }}] Action: ${{ inputs.action }}"
on:
  workflow_dispatch:
    inputs:
      target: { required: true, type: choice, options: [prod, test] }
      action:
        required: true
        type: choice
        options: [pulse, authorize, prune, nuclear, rescue]
      arg: { description: 'Payload (e.g. SSH Key for authorize)', required: false }
jobs:
  execute:
    runs-on: ['self-hosted', '${{ inputs.target }}']
    steps:
      - name: "🛰️ Synchronize: Infrastructure Library"
        run: curl -sSL https://raw.githubusercontent.com/${{github.repository}}/main/scripts/lib-infra.sh -o lib-infra.sh
      - name: "🛠️ Execute: ${{ inputs.action }}"
        run: bash lib-infra.sh "${{ inputs.action }}" "${{ inputs.arg }}"
