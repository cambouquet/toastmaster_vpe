name: "🛠️ MAINTENANCE: Infrastructure Tasks"
run-name: "🛠️ [${{ inputs.target }}] Task: ${{ inputs.action }}"
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Server Target'
        required: true
        type: choice
        options: [prod, test, all]
        default: 'all'
      action:
        description: 'Action to Perform'
        required: true
        type: choice
        options: [telemetry, cleanup, patch-os, hard-reset, restart-runner, debug-runner-issue, cancel-queued]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.target }}" = "all" ]; then
            echo 'matrix=["prod", "test"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ github.event.inputs.target }}"]' >> $GITHUB_OUTPUT
          fi

  maintenance:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: { target: ${{ fromJson(needs.prepare.outputs.matrix) }} }
    steps:
      - name: "🛰️ Fetch Action Token"
        id: tok
        env: { GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} }
        run: |
          T=$(gh api -X POST repos/${{github.repository}}/actions/runners/registration-token -q .token)
          echo "t=$T" >> $GITHUB_OUTPUT
      - name: "SSH Maintenance Task: ${{ inputs.action }}"
        uses: appleboy/ssh-action@v1.2.5
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REG_TOKEN: ${{ steps.tok.outputs.t }}
        with:
          host: ${{ matrix.target == 'prod' && secrets.VM_HOST || secrets.VM_HOST_TEST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GH_TOKEN,REG_TOKEN
          script: |
            set -e
            curl -sSL "https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/lib-infra.sh?t=$(date +%s)" -o ~/lib-infra.sh
            export GH_TOKEN="$GH_TOKEN"
            
            # Pre-flight self-healing for Runner Service
            if [[ "${{ inputs.action }}" != "hard-reset" ]] && ! systemctl is-active --quiet "actions.runner.*"; then
               echo "║ 🩹 AUTO-REPAIR: Restoring Runner Service...                 ║"
               cd /home/${{ secrets.VM_USER }}/actions-runner || (mkdir -p ~/actions-runner && cd ~/actions-runner)
               sudo ./svc.sh install > /dev/null 2>&1 || true
               sudo setsid bash -c "sleep 5; cd /home/${{ secrets.VM_USER }}/actions-runner && ./svc.sh start" > /dev/null 2>&1 &
               sleep 2
            fi

            # Execute Task with Zero-Intervention Repair on Fail
            if ! bash ~/lib-infra.sh "${{ inputs.action }}"; then
               echo "╔══════════════════════════════════════════════════════════════╗"
               echo "║ 🤖 ZERO-INTERVENTION: Task failed. Triggering PROVISION...  ║"
               echo "╚══════════════════════════════════════════════════════════════╝"
               export TOKEN="$REG_TOKEN"
               export TARGET="${{ matrix.target }}"
               export REPO="${{ github.repository }}"
               curl -sSL "https://raw.githubusercontent.com/${{ github.repository }}/main/setup_vm.sh?t=$(date +%s)" | bash
               curl -sSL "https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/setup-runner.sh?t=$(date +%s)" | bash -s -- "$TOKEN" "$TARGET" "$REPO"
               # Re-run the task once more after repair to ensure mission success
               echo "║ 🚀 RE-EXECUTING TASK AFTER REPAIR...                        ║"
               bash ~/lib-infra.sh "${{ inputs.action }}"
            fi
