name: "🛠️ MAINTENANCE: Infrastructure Control"
run-name: "🛠️ [${{ inputs.target }}] Task: ${{ inputs.action }}"
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target Server'
        required: true
        type: choice
        options: [prod, test, all]
        default: 'all'
      action:
        description: 'Maintenance Task'
        required: true
        type: choice
        options: [pulse, prune, upgrade, burn, rescue]
      host:
        description: 'Manual IP (if not in secrets)'
        required: false
        type: string
      arg:
        description: 'Optional Input'
        required: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.target }}" = "all" ]; then
            echo 'matrix=["prod", "test"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ github.event.inputs.target }}"]' >> $GITHUB_OUTPUT
          fi

  rescue-operation:
    needs: prepare
    if: github.event.inputs.action == 'rescue'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: "⛑️ Rescue Handshake: ${{ matrix.target }}"
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ github.event.inputs.host || (matrix.target == 'prod' && secrets.VM_HOST || secrets.VM_HOST_TEST) }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "--- ⛑️ EMERGENCY RESCUE: ${{ matrix.target }} ---"
            # Dispatch to background and disown to prevent signal 143/137 from killing the SSH session
            # We use a subshell to ensure the sequence completes even if SSH disconnects
            nohup bash -c "
              echo '🛑 Stopping runner...'
              sudo systemctl stop actions.runner.* || true
              sudo pkill -9 -f 'Runner.Worker' || true
              sudo pkill -9 -f 'Runner.Listener' || true
              
              echo '🏁 Starting runner...'
              cd ~/actions-runner && sudo ./svc.sh start
              echo '✅ Runner restarted.'
            " > /dev/null 2>&1 &
            
            # Give it a tiny bit of time to start the nohup process
            sleep 2
            echo "✅ Rescue command dispatched and detached."
            exit 0

  standard-operation:
    needs: prepare
    if: github.event.inputs.action != 'rescue'
    runs-on: ['self-hosted', '${{ matrix.target }}']
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: "🛰️ Synchronize: infra-lib"
        run: curl -sSL https://raw.githubusercontent.com/${{github.repository}}/main/scripts/lib-infra.sh -o lib-infra.sh
      - name: "🛠️ Execute: ${{ inputs.action }}"
        run: bash lib-infra.sh "${{ inputs.action }}" "${{ inputs.arg }}"
