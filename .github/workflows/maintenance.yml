name: "🛠️ MAINTENANCE: Server Infrastructure"
run-name: "🛠️ [${{ inputs.target }}] Task: ${{ inputs.action }}"
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Server Target'
        required: true
        type: choice
        options: [prod, test, all]
        default: 'all'
      action:
        description: 'Action to Perform'
        required: true
        type: choice
        options: [telemetry, cleanup, patch-os, hard-reset, restart-runner, debug-runner-issue, cancel-queued]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.target }}" = "all" ]; then
            echo 'matrix=["prod", "test"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ github.event.inputs.target }}"]' >> $GITHUB_OUTPUT
          fi

  maintenance:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: "SSH Maintenance Task: ${{ inputs.action }}"
        uses: appleboy/ssh-action@v1.2.5
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ matrix.target == 'prod' && secrets.VM_HOST || secrets.VM_HOST_TEST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GH_TOKEN
          script: |
            set -e
            # Use cache-busting timestamp for the library fetch
            curl -sSL "https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/lib-infra.sh?t=$(date +%s)" -o ~/lib-infra.sh
            export GH_TOKEN="$GH_TOKEN"
            
            if [[ "${{ inputs.action }}" != "hard-reset" ]]; then
              if ! systemctl is-active --quiet "actions.runner.*"; then
                 echo "╔══════════════════════════════════════════════════════════════╗"
                 echo "║ 🩹 AUTO-REPAIR DETECTED: Service restored via pre-flight.    ║"
                 echo "╚══════════════════════════════════════════════════════════════╝"
                 cd /home/${{ secrets.VM_USER }}/actions-runner || exit 1
                 sudo ./svc.sh install > /dev/null 2>&1 || true
                 sudo setsid bash -c "sleep 5; cd /home/${{ secrets.VM_USER }}/actions-runner && ./svc.sh start" > /dev/null 2>&1 &
                 sleep 2
              fi
            fi

            bash ~/lib-infra.sh "${{ inputs.action }}"
