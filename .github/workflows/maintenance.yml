name: "🛠️ MAINTENANCE: Infrastructure Control"
run-name: "🛠️ [${{ inputs.target }}] Task: ${{ inputs.action }}"
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target Server'
        required: true
        type: choice
        options: [prod, test, all]
        default: 'all'
      action:
        description: 'Maintenance Task'
        required: true
        type: choice
        options: [telemetry, cleanup, patch-os, hard-reset, restart-runner, debug-runner-issue]
      host:
        description: 'Manual IP (if not in secrets)'
        required: false
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.target }}" = "all" ]; then
            echo 'matrix=["prod", "test"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ github.event.inputs.target }}"]' >> $GITHUB_OUTPUT
          fi

  infrastructure-control:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: "🛰️ Out-of-Band Action: ${{ inputs.action }}"
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ github.event.inputs.host || (matrix.target == 'prod' && secrets.VM_HOST || secrets.VM_HOST_TEST) }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Fetch latest infra library
            curl -sSL https://raw.githubusercontent.com/${{github.repository}}/main/scripts/lib-infra.sh -o ~/lib-infra.sh
            
            # 2. Smart Chaining & Auto-Repair Logic
            ACTION="${{ inputs.action }}"
            
            # Auto-Repair: ensure runner is alive before standard maintenance
            if [[ "$ACTION" != "hard-reset" && "$ACTION" != "restart-runner" && "$ACTION" != "debug-runner-issue" ]]; then
              if ! systemctl is-active --quiet "actions.runner.*"; then
                echo "⚠️ Runner is OFFLINE. Triggering auto-repair..."
                sudo systemctl stop actions.runner.* || true
                sudo pkill -9 -f "Runner" || true
                cd ~/actions-runner && sudo ./svc.sh start || true
                sleep 5
              fi
            fi

            # 3. Execute primary action
            bash ~/lib-infra.sh "$ACTION"
            
            # 4. Chain dependent actions
            if [ "$ACTION" == "cleanup" ]; then
              echo "⏭️ Auto-Chaining: telemetry..."
              bash ~/lib-infra.sh "telemetry"
            fi
