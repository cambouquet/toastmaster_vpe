name: "🛠️ MAINTENANCE: Infrastructure Control"
run-name: "🛠️ [${{ inputs.target }}] Task: ${{ inputs.action }}"
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target Server'
        required: true
        type: choice
        options: [prod, test, all]
        default: 'all'
      action:
        description: 'Maintenance Task'
        required: true
        type: choice
        options: [telemetry, cleanup, patch-os, hard-reset, restart-runner, debug-runner-issue]
      host:
        description: 'Manual IP (if not in secrets)'
        required: false
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.target }}" = "all" ]; then
            echo 'matrix=["prod", "test"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ github.event.inputs.target }}"]' >> $GITHUB_OUTPUT
          fi

  infrastructure-control:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: "🛰️ Out-of-Band Action: ${{ inputs.action }}"
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ github.event.inputs.host || (matrix.target == 'prod' && secrets.VM_HOST || secrets.VM_HOST_TEST) }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Fetch latest infra library
            curl -sSL https://raw.githubusercontent.com/${{github.repository}}/main/scripts/lib-infra.sh -o ~/lib-infra.sh
            
            # 2. Define Detached Repair Command
            RESTART_CMD="sudo systemd-run --unit=runner-fix-$(date +%s) --remain-after-exit bash -c 'systemctl stop actions.runner.* || true; pkill -9 -f Runner || true; sleep 2; cd /home/${{ secrets.VM_USER }}/actions-runner && ./svc.sh start'"

            # 3. Special Case: Restart Runner
            if [ "${{ inputs.action }}" == "restart-runner" ]; then
              echo "⛑️ Restarting Runner (Detached)..."
              eval "$RESTART_CMD"
              echo "--- ⏭️ NEXT ACTIONS ---"
              echo "1. Wait 30s. 2. Run telemetry."
              exit 0
            fi

            # 4. Special Case: Debug
            if [ "${{ inputs.action }}" == "debug-runner-issue" ]; then
              echo "🔍 Debugging Runner Issue..."
              sudo systemctl list-units "actions.runner.*" --all
              sudo journalctl -u "actions.runner.*" -n 20 --no-pager
              exit 0
            fi

            # 5. Auto-Repair (Ensures we fix while we maintain)
            if [ "${{ inputs.action }}" != "hard-reset" ]; then
              if ! systemctl is-active --quiet "actions.runner.*"; then
                echo "⚠️ Runner is OFFLINE. Triggering auto-repair (detached)..."
                eval "$RESTART_CMD"
                sleep 2
              fi
            fi

            # 6. Primary Library Execution
            bash ~/lib-infra.sh "${{ inputs.action }}"

            # 7. Auto-Chaining
            if [ "${{ inputs.action }}" == "cleanup" ]; then
              echo "⏭️ Chaining telemetry..."
              bash ~/lib-infra.sh "telemetry"
            fi
