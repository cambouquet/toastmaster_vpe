name: "🛠️ INFRASTRUCTURE: Server Control"
run-name: "🛠️ [${{ inputs.target }}] Action: ${{ inputs.action }}"
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Server Target'
        required: true
        type: choice
        options: [prod, test, all]
        default: 'all'
      action:
        description: 'Action to Perform'
        required: true
        type: choice
        options: [master-heal, telemetry, cleanup, patch-os, provision, hard-reset, cancel-queued]
        default: 'master-heal'
      host:
        description: 'New VM IP (required for provision/master-heal if not in secrets)'
        required: false
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.target }}" = "all" ]; then
            echo 'matrix=["prod", "test"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ github.event.inputs.target }}"]' >> $GITHUB_OUTPUT
          fi

  execute:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: "🛰️ Fetch Action Token"
        id: tok
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          T=$(gh api -X POST repos/${{github.repository}}/actions/runners/registration-token -q .token)
          echo "t=$T" >> $GITHUB_OUTPUT

      - name: "💾 Persist Host Secret"
        if: github.event.inputs.host != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          S_NAME="VM_HOST$( [ "${{ matrix.target }}" = "test" ] && echo "_TEST" || echo "" )"
          gh secret set "$S_NAME" --body "${{ github.event.inputs.host }}" -R "${{ github.repository }}"

      - name: "⚡ Execute: ${{ inputs.action }}"
        uses: appleboy/ssh-action@v1.2.5
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REG_TOKEN: ${{ steps.tok.outputs.t }}
        with:
          host: ${{ github.event.inputs.host || (matrix.target == 'prod' && secrets.VM_HOST || secrets.VM_HOST_TEST) }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GH_TOKEN,REG_TOKEN
          script: |
            set -e
            URL="https://raw.githubusercontent.com/${{ github.repository }}/main"
            TS="?t=$(date +%s)"
            export TOKEN="$REG_TOKEN" TARGET="${{ matrix.target }}" REPO="${{ github.repository }}" GH_TOKEN="$GH_TOKEN"
            
            run_provision() {
              echo "🛰️ PROVISIONING: Repairing Node..."
              curl -sSL "$URL/setup_vm.sh$TS" | bash
              curl -sSL "$URL/scripts/setup-runner.sh$TS" | bash -s -- "$TOKEN" "$TARGET" "$REPO"
            }

            run_task() {
              local TASK=$1
              echo "⚙️ RUNNING TASK: $TASK"
              curl -sSL "$URL/scripts/lib-infra.sh$TS" -o ~/lib-infra.sh
              if ! bash ~/lib-infra.sh "$TASK"; then
                echo "🤖 ZERO-INTERVENTION: Task [$TASK] failed. Triggering HEAL..."
                run_provision
                echo "🚀 RETRYING TASK: $TASK"
                bash ~/lib-infra.sh "$TASK"
              fi
            }

            if [ "${{ inputs.action }}" = "provision" ]; then
              run_provision
            elif [ "${{ inputs.action }}" = "master-heal" ]; then
              echo "🛡️ MASTER-HEAL SEQUENCE INITIATED"
              run_task "telemetry"
              run_task "cleanup"
              run_task "cancel-queued"
              echo "✅ MASTER-HEAL COMPLETE"
            else
              run_task "${{ inputs.action }}"
            fi
