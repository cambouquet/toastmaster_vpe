name: 🚀 DEPLOY | Production & Test
on:
  push:
    branches: [main]
  workflow_dispatch:


jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: System Verification
        run: |
          node --version
          npm --version
          # No GHCR push needed. Environment-specific artifacts 
          # are baked at deployment time on the target node.

  deploy:
    needs: build
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix: { target: [prod, test] }
    steps:
      - uses: actions/checkout@v6
      - name: Deploy ${{ matrix.target }}
        uses: ./.github/actions/deploy-env
        with:
          target: ${{ matrix.target }}
          vm_host: ${{ secrets.VM_HOST }}
          vm_user: ${{ secrets.VM_USER }}
          ssh_key: ${{ secrets.SSH_PRIVATE_KEY }}
          app_image: ghcr.io/${{ github.repository }}:latest
