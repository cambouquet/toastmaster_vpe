name: "🚀 DEPLOY: Application Release"
run-name: "🚀 [${{ github.ref_name }}] ${{ github.event.head_commit.message || github.actor }} - Deployed"
on:
  push: { branches: [main] }
  workflow_dispatch:

jobs:
  deploy:
    name: "🚀 Deploy [${{ matrix.target }}]"
    runs-on: [self-hosted, "${{ matrix.target }}"]
    strategy:
      fail-fast: false
      matrix: { target: [prod, test] }
    steps:
      - name: "🛰️ Native Setup"
        run: |
          (git fetch --depth 1 origin main && git reset --hard FETCH_HEAD && git clean -fd) || (
            echo "⚠️ RAPID FIRE Setup failed. Running Deep Recovery..."
            git init
            git remote add origin https://github.com/${{ github.repository }}.git 2>/dev/null || \
            git remote set-url origin https://github.com/${{ github.repository }}.git
            git fetch --depth 1 origin main
            git reset --hard FETCH_HEAD
            git clean -fd
          )
      - name: "🚢 Native SSH Deployment"
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_HOST: ${{ matrix.target == 'prod' && secrets.VM_HOST || secrets.VM_HOST_TEST }}
          TARGET: ${{ matrix.target }}
        run: |
          export ID_FILE=$(mktemp)
          echo "$SSH_KEY" > "$ID_FILE"
          chmod 600 "$ID_FILE"
          bash scripts/deploy-ssh.sh
          rm -f "$ID_FILE"
