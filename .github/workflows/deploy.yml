name: Deploy to OVH

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      force_setup:
        description: 'Force VM infrastructure setup'
        type: boolean
        default: false
      no_cache:
        description: 'Disable Docker build cache'
        type: boolean
        default: false
      full_restart:
        description: 'Full restart (docker compose down && up)'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=raw,value=main

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: ${{ github.event.inputs.no_cache == 'true' && '' || 'type=gha' }}
          cache-to: ${{ github.event.inputs.no_cache == 'true' && '' || 'type=gha,mode=max' }}
          no-cache: ${{ github.event.inputs.no_cache == 'true' }}
          build-args: |
             NODE_ENV=production
          provenance: false

      - name: Preparing scripts
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/app/deploy ~/.deploy_scripts
            if [[ "${{ github.event.inputs.force_setup }}" == "true" ]]; then 
              echo "🔄 Forcing setup reset..."
              rm -f ~/.vm_ready
            fi

      - name: Sync configuration and scripts
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,keycloak-realm.json,deploy/Caddyfile,.github/scripts/*.sh"
          target: "~/app"

      - name: Remote Deployment
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          REGISTRY_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
          FULL_RESTART: ${{ github.event.inputs.full_restart }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR,REGISTRY_IMAGE,FULL_RESTART
          script: |
            mv ~/app/.github/scripts/*.sh ~/.deploy_scripts/
            chmod +x ~/.deploy_scripts/*.sh
            ~/.deploy_scripts/setup-vm.sh
            ~/.deploy_scripts/deploy-app.sh
