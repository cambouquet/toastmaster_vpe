name: Deploy to OVH

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=sha,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true
          build-args: |
             NODE_ENV=production

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pre-deployment cleanup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            mkdir -p ~/app/deploy
            # Clean up existing files that might be owned by root due to docker mounts
            sudo rm -f ~/app/docker-compose.prod.yml ~/app/keycloak-realm.json
            sudo rm -rf ~/app/deploy/Caddyfile
            # Ensure the user has ownership of the target directory
            sudo chown -R ${{ secrets.VM_USER }} ~/app

      - name: Copy docker-compose and config files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "docker-compose.prod.yml,keycloak-realm.json,deploy/Caddyfile"
          target: "~/app"

      - name: SSH into VM and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            
            # Check if docker is installed, if not install it
            if ! command -v docker &> /dev/null; then
              echo "Docker not found. Installing..."
              curl -fsSL https://get.docker.com -o get-docker.sh
              sudo sh get-docker.sh
              sudo usermod -aG docker $USER
            fi
            
            mkdir -p ~/app
            cd ~/app
            
            # Use sudo for docker commands to ensure they work immediately after installation
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            export APP_IMAGE="${IMAGE_NAME}:main"
            echo "APP_IMAGE=${APP_IMAGE}" > .env
            
            # Install necessary tools for port management
            sudo apt-get update && sudo apt-get install -y psmisc
            
            # Clean up potential port blockers
            sudo systemctl stop nginx || true
            sudo systemctl disable nginx || true
            sudo fuser -k 80/tcp || true
            sudo fuser -k 443/tcp || true
            sudo fuser -k 8080/tcp || true
            
            # Ensure Firewall allows traffic
            if command -v ufw &> /dev/null; then
              sudo ufw allow 22/tcp
              sudo ufw allow 80/tcp
              sudo ufw allow 443/tcp
              sudo ufw allow 8080/tcp
              sudo ufw --force enable
            fi
            
            sudo -E docker compose -f docker-compose.prod.yml down --remove-orphans || true
            sudo -E docker compose -f docker-compose.prod.yml pull
            sudo -E docker compose -f docker-compose.prod.yml up -d --force-recreate
            
            # Prune old images to prevent disk space issues
            sudo docker image prune -f
            
            # Verify status
            sleep 10
            sudo -E docker compose -f docker-compose.prod.yml ps
            
            # If caddy or app aren't healthy, show logs
            sudo -E docker compose -f docker-compose.prod.yml logs --tail=50 caddy
            sudo -E docker compose -f docker-compose.prod.yml logs --tail=50 app
            sudo docker compose -f docker-compose.prod.yml ps
