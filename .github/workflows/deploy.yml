name: 🚀 DEPLOY | Production & Test
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix: { target: [prod, test] }
    steps:
      - name: "🛰️ Native Setup"
        run: |
          rm -rf .github scripts deploy.mjs # clean old state
          git clone --depth 1 https://github.com/${{ github.repository }}.git .
      - name: "🚢 Native SSH Deployment"
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          TARGET: ${{ matrix.target }}
        run: |
          export ID_FILE=$(mktemp)
          echo "$SSH_KEY" > "$ID_FILE"
          chmod 600 "$ID_FILE"
          bash scripts/deploy-ssh.sh
          rm -f "$ID_FILE"
