name: Infrastructure Reset

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "RESET" to confirm VM infrastructure reset'
        required: true
        default: 'NO'


jobs:
  reset:
    if: github.event.inputs.confirm == 'RESET'
    runs-on: ubuntu-latest
    steps:
      - name: Reset VM Infrastructure State
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "🗑️ Removing VM ready flag..."
            rm -f ~/.vm_ready
            echo "✅ Setup will run on next deployment."
