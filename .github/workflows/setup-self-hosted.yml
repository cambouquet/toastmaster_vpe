name: 🛰️ System: Authorize Self-Hosted Node

on:
  workflow_dispatch:
    inputs:
      target: { required: true, type: choice, options: [prod, test] }
      host: { required: true, type: string }

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions: { actions: write }
    steps:
      - name: Fetch Token
        id: tok
        env: { GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }} }
        run: |
          T=$(gh api -X POST repos/${{github.repository}}/actions/runners/registration-token -q .token)
          echo "t=$T" >> $GITHUB_OUTPUT
      - name: "🛰️ Native Setup"
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ inputs.host }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export TOKEN="${{ steps.tok.outputs.t }}"
            export TARGET="${{ inputs.target }}"
            export REPO="${{ github.repository }}"
            # Install Docker & Node standard
            curl -sSL https://raw.githubusercontent.com/$REPO/main/setup_vm.sh | bash
            # Install Runner
            curl -sSL https://raw.githubusercontent.com/$REPO/main/scripts/setup-runner.sh | bash -s -- "$TOKEN" "$TARGET" "$REPO"
