name: 🛰️ System: Authorize Self-Hosted Node

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target instance (prod or test)'
        required: true
        type: choice
        options: [prod, test]
      host:
        description: 'VM IP/Hostname'
        required: true
        type: string
      runner_token:
        description: 'GitHub Runner Token'
        required: true
        type: string

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: "🛰️ Native Setup: $TARGET Node"
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ inputs.host }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            sudo rm -rf ~/actions-runner && mkdir -p ~/actions-runner && cd ~/actions-runner
            RUNNER_VER="2.321.0"
            curl -o runner.tar.gz -L https://github.com/actions/runner/releases/download/v${RUNNER_VER}/actions-runner-linux-x64-${RUNNER_VER}.tar.gz
            tar xzf ./runner.tar.gz
            ./config.sh --url https://github.com/${{ github.repository }} --token ${{ github.event.inputs.runner_token }} --labels "self-hosted,${{ inputs.target }}" --name "runner-${{ inputs.target }}" --unattended --replace
            if ! node -v | grep -q "v24"; then
              curl -fsSL https://deb.nodesource.com/setup_24.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi
            sudo ./svc.sh install && sudo ./svc.sh start
            echo "✅ Node [${{ inputs.target }}] @ ${{ inputs.host }} online."
